<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Municipal Rail — Resident Dashboard (Reference UI)</title>
<style>
  body { font-family: -apple-system, Arial, sans-serif; background: #f1f4f8; margin: 0; padding: 0; color: #1f2d3d; }
  header { background: #0b3d2e; color: white; padding: 18px 24px; }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 4px 0 0; font-size: 13px; color: #b9d6c8; }
  main { max-width: 640px; margin: 24px auto; padding: 0 16px; }
  .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card h2 { margin-top: 0; font-size: 16px; color: #0b3d2e; }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
  input { width: 100%; padding: 9px 10px; border: 1px solid #ccd5dd; border-radius: 6px; font-size: 14px; box-sizing: border-box; margin-bottom: 10px; }
  button { background: #0b3d2e; color: white; border: none; padding: 10px 18px; border-radius: 6px; font-size: 14px; cursor: pointer; }
  button:hover { background: #145c44; }
  button.secondary { background: #5b6b79; }
  button.secondary:hover { background: #45525e; }
  .balance { font-size: 32px; font-weight: 700; color: #0b3d2e; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  table { width: 100%; font-size: 13px; border-collapse: collapse; }
  th, td { text-align: left; padding: 6px 4px; border-bottom: 1px solid #eee; }
  .msg { font-size: 13px; padding: 8px 10px; border-radius: 6px; margin-bottom: 10px; }
  .msg.error { background: #fde8e8; color: #9b1c1c; }
  .msg.success { background: #e6f6ec; color: #1b6b3a; }
  .hidden { display: none; }
  .muted { color: #777; font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1>Municipal Rail — Resident Dashboard</h1>
  <p>Reference implementation only — a demo of what calls the API, not the product itself.</p>
</header>

<main>
  <div class="card" id="lookup-card">
    <h2>Find your account</h2>
    <div id="lookup-msg"></div>
    <label>Municipality ID</label>
    <input id="municipality-id" type="number" value="1">
    <label>Account number</label>
    <input id="account-number" placeholder="e.g. SW-00123">
    <button onclick="lookupAccount()">View account</button>
  </div>

  <div class="card hidden" id="account-card">
    <h2 id="account-name"></h2>
    <p class="muted" id="account-meta"></p>
    <p class="muted">Outstanding balance</p>
    <div class="balance" id="account-balance"></div>
    <div class="row" style="margin-top:14px;">
      <button onclick="payNow()">Pay now</button>
      <button class="secondary" onclick="showFaultForm()">Report a fault</button>
    </div>
    <div id="account-action-msg"></div>
  </div>

  <div class="card hidden" id="fault-card">
    <h2>Report a fault / service request</h2>
    <label>Category</label>
    <input id="fault-category" placeholder="water, electricity, roads...">
    <label>Description</label>
    <input id="fault-description" placeholder="No water since this morning">
    <button onclick="submitFault()">Submit</button>
    <button class="secondary" onclick="hideFaultForm()">Cancel</button>
    <div id="fault-msg"></div>
  </div>

  <div class="card hidden" id="history-card">
    <h2>Payment / transaction history</h2>
    <table id="history-table">
      <thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Description</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</main>

<script>
const API_BASE = new URLSearchParams(window.location.search).get('api') || window.API_BASE || "http://localhost:8000";
const NGROK_HEADERS = { 'ngrok-skip-browser-warning': 'true' };
let currentAccount = null;

function showMsg(elId, text, kind) {
  document.getElementById(elId).innerHTML = `<div class="msg ${kind}">${text}</div>`;
}
function clearMsg(elId) {
  document.getElementById(elId).innerHTML = "";
}

async function lookupAccount() {
  clearMsg('lookup-msg');
  const municipalityId = document.getElementById('municipality-id').value;
  const accountNumber = document.getElementById('account-number').value.trim();
  if (!accountNumber) { showMsg('lookup-msg', 'Enter an account number.', 'error'); return; }

  try {
    const res = await fetch(`${API_BASE}/municipalities/${municipalityId}/accounts/lookup?account_number=${encodeURIComponent(accountNumber)}`, { headers: NGROK_HEADERS });
    if (!res.ok) throw new Error((await res.json()).detail || 'Account not found');
    currentAccount = await res.json();
    renderAccount();
    await loadHistory();
  } catch (err) {
    showMsg('lookup-msg', err.message, 'error');
  }
}

function renderAccount() {
  document.getElementById('account-card').classList.remove('hidden');
  document.getElementById('account-name').textContent = currentAccount.resident_name;
  document.getElementById('account-meta').textContent =
    `${currentAccount.account_number} · ${currentAccount.account_type} · ${currentAccount.address || ''}`;
  document.getElementById('account-balance').textContent = `R ${Number(currentAccount.balance).toFixed(2)}`;
  clearMsg('account-action-msg');
}

async function loadHistory() {
  const res = await fetch(`${API_BASE}/accounts/${currentAccount.id}/history`, { headers: NGROK_HEADERS });
  if (!res.ok) return;
  const data = await res.json();
  const tbody = document.querySelector('#history-table tbody');
  tbody.innerHTML = '';
  data.transactions.forEach(tx => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${new Date(tx.date).toLocaleDateString()}</td><td>${tx.type}</td><td>R ${Number(tx.amount).toFixed(2)}</td><td>${tx.description || ''}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('history-card').classList.remove('hidden');
}

async function payNow() {
  if (!currentAccount) return;
  clearMsg('account-action-msg');
  const amount = prompt('Amount to pay:', currentAccount.balance);
  if (!amount) return;
  try {
    // Real flow: hand off to PayGate. The balance only updates once
    // PayGate's notify webhook confirms the payment server-to-server —
    // the form POST below is just where the resident's browser ends up.
    // PayGate only lets you redirect back to an http(s) URL, so when this
    // page is opened as a local file we fall back to the API's /docs page.
    const returnUrl = window.location.href.startsWith('http')
      ? window.location.href
      : `${API_BASE}/docs`;
    const res = await fetch(`${API_BASE}/payments/initiate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...NGROK_HEADERS },
      body: JSON.stringify({
        account_id: currentAccount.id,
        amount: parseFloat(amount),
        return_url: returnUrl,
      }),
    });
    if (!res.ok) throw new Error((await res.json()).detail || 'Could not start payment');
    const result = await res.json();
    // process.trans requires an HTTP POST of PAY_REQUEST_ID + CHECKSUM,
    // so build and submit a form rather than navigating to a URL.
    submitToPayGate(result.process_url, result.pay_request_id, result.checksum);
  } catch (err) {
    showMsg('account-action-msg', err.message, 'error');
  }
}

function submitToPayGate(processUrl, payRequestId, checksum) {
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = processUrl;
  for (const [name, value] of Object.entries({ PAY_REQUEST_ID: payRequestId, CHECKSUM: checksum })) {
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = name;
    input.value = value;
    form.appendChild(input);
  }
  document.body.appendChild(form);
  form.submit();
}

function showFaultForm() {
  document.getElementById('fault-card').classList.remove('hidden');
}
function hideFaultForm() {
  document.getElementById('fault-card').classList.add('hidden');
  clearMsg('fault-msg');
}

async function submitFault() {
  clearMsg('fault-msg');
  const category = document.getElementById('fault-category').value.trim();
  const description = document.getElementById('fault-description').value.trim();
  if (!category || !description) { showMsg('fault-msg', 'Fill in both fields.', 'error'); return; }

  try {
    const res = await fetch(`${API_BASE}/tickets`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...NGROK_HEADERS },
      body: JSON.stringify({
        municipality_id: parseInt(document.getElementById('municipality-id').value),
        account_id: currentAccount ? currentAccount.id : null,
        category,
        description,
      }),
    });
    if (!res.ok) throw new Error((await res.json()).detail || 'Could not log ticket');
    const ticket = await res.json();
    showMsg('fault-msg', `Logged. Your reference number: ${ticket.reference_number}`, 'success');
  } catch (err) {
    showMsg('fault-msg', err.message, 'error');
  }
}
</script>
</body>
</html>
