<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Municipal Rail — WhatsApp Flow Mockup</title>
<style>
  body { font-family: -apple-system, Arial, sans-serif; background: #0b141a; margin: 0; }
  .phone { max-width: 420px; margin: 24px auto; background: #e5ddd5; border-radius: 14px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .wa-header { background: #075e54; color: white; padding: 14px 16px; font-size: 15px; font-weight: 600; }
  .wa-header span { display: block; font-size: 11px; font-weight: 400; color: #cfe9e3; margin-top: 2px; }
  .chat { height: 520px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .bubble { max-width: 78%; padding: 8px 10px; border-radius: 8px; font-size: 13.5px; line-height: 1.4; white-space: pre-wrap; }
  .bot { background: white; align-self: flex-start; border-top-left-radius: 0; }
  .user { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; }
  .quick-replies { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; background: #ece5dd; border-top: 1px solid #d4cfc7; }
  .quick-replies button { background: white; border: 1px solid #25d366; color: #075e54; border-radius: 16px; padding: 6px 12px; font-size: 12.5px; cursor: pointer; }
  .quick-replies button:hover { background: #e6fff0; }
  .input-row { display: flex; gap: 6px; padding: 10px; background: #ece5dd; }
  .input-row input { flex: 1; border: none; border-radius: 18px; padding: 9px 14px; font-size: 13.5px; }
  .input-row button { background: #25d366; border: none; color: white; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; }
</style>
</head>
<body>
<div class="phone">
  <div class="wa-header">Swartland Municipality
    <span>Powered by Municipal Rail — sandbox number, mockup only</span>
  </div>
  <div class="chat" id="chat"></div>
  <div class="quick-replies" id="quick-replies"></div>
  <div class="input-row">
    <input id="free-text" placeholder="Type an account number or message...">
    <button onclick="handleFreeText()">&#10148;</button>
  </div>
</div>

<script>
const API_BASE = new URLSearchParams(window.location.search).get('api') || window.API_BASE || "http://localhost:8000";
const NGROK_HEADERS = { 'ngrok-skip-browser-warning': 'true' };
const MUNICIPALITY_ID = 1;
let session = { stage: 'await_account', account: null };

function addBubble(text, sender) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `bubble ${sender}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function setQuickReplies(options) {
  const container = document.getElementById('quick-replies');
  container.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.textContent = opt;
    btn.onclick = () => handleInput(opt);
    container.appendChild(btn);
  });
}

function botSay(text) {
  setTimeout(() => addBubble(text, 'bot'), 300);
}

async function handleInput(text) {
  addBubble(text, 'user');
  const lower = text.trim().toLowerCase();

  if (session.stage === 'await_account') {
    try {
      const res = await fetch(`${API_BASE}/municipalities/${MUNICIPALITY_ID}/accounts/lookup?account_number=${encodeURIComponent(text.trim())}`, { headers: NGROK_HEADERS });
      if (!res.ok) throw new Error('not found');
      session.account = await res.json();
      session.stage = 'menu';
      botSay(`Hi ${session.account.resident_name.split(' ')[0]}! Account ${session.account.account_number} found.\nWhat would you like to do?`);
      setQuickReplies(['balance', 'pay', 'report fault']);
    } catch {
      botSay("I couldn't find that account number. Please check your bill and try again, e.g. SW-00123.");
    }
    return;
  }

  if (session.stage === 'menu') {
    if (lower.includes('balance')) {
      botSay(`Your outstanding balance is R ${Number(session.account.balance).toFixed(2)}.`);
      setQuickReplies(['balance', 'pay', 'report fault']);
    } else if (lower.includes('pay')) {
      session.stage = 'await_pay_amount';
      botSay(`How much would you like to pay? (Mocked — no real PSP yet)`);
    } else if (lower.includes('fault') || lower.includes('report')) {
      session.stage = 'await_fault_category';
      botSay('What category is the fault? (water, electricity, roads, other)');
    } else {
      botSay("Sorry, I didn't understand. Choose an option below.");
      setQuickReplies(['balance', 'pay', 'report fault']);
    }
    return;
  }

  if (session.stage === 'await_pay_amount') {
    const amount = parseFloat(text);
    if (isNaN(amount) || amount <= 0) {
      botSay('Please enter a valid amount, e.g. 200');
      return;
    }
    // Real flow: a WhatsApp bot would send a PayGate payment link, the
    // resident pays in their browser, and PayGate's webhook confirms the
    // payment server-to-server — the bot finds out by polling status (or
    // would itself receive a webhook in a real BSP integration).
    const returnUrl = window.location.href.startsWith('http')
      ? window.location.href
      : `${API_BASE}/docs`;
    const res = await fetch(`${API_BASE}/payments/initiate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...NGROK_HEADERS },
      body: JSON.stringify({
        account_id: session.account.id,
        amount,
        return_url: returnUrl,
      }),
    });
    if (!res.ok) {
      botSay("Sorry, couldn't start the payment right now. Please try again later.");
      session.stage = 'menu';
      setQuickReplies(['balance', 'pay', 'report fault']);
      return;
    }
    const result = await res.json();
    session.pendingPaymentId = result.pending_payment_id;
    session.stage = 'await_payment_confirmation';
    // process.trans needs an HTTP POST, so open the payment in a new tab
    // via an auto-submitting form (a real WhatsApp bot would instead send
    // a hosted payment link). The chat stays put so we can poll status.
    openPayGateInNewTab(result.process_url, result.pay_request_id, result.checksum);
    botSay(`Opening the payment page in a new tab...\n\nOnce you've paid, reply "done" and I'll check.`);
    setQuickReplies(['done']);
    return;
  }

  if (session.stage === 'await_payment_confirmation') {
    const res = await fetch(`${API_BASE}/payments/${session.pendingPaymentId}/status`, { headers: NGROK_HEADERS });
    const result = await res.json();
    if (result.status === 'completed') {
      session.stage = 'menu';
      botSay('Payment confirmed, thank you! Your balance has been updated.');
      const acctRes = await fetch(`${API_BASE}/municipalities/${MUNICIPALITY_ID}/accounts/lookup?account_number=${encodeURIComponent(session.account.account_number)}`);
      session.account = await acctRes.json();
      setQuickReplies(['balance', 'pay', 'report fault']);
    } else if (result.status === 'failed') {
      session.stage = 'menu';
      botSay("That payment wasn't successful. Want to try again?");
      setQuickReplies(['balance', 'pay', 'report fault']);
    } else {
      botSay("Still waiting for confirmation. Reply \"done\" again once you've paid.");
      setQuickReplies(['done']);
    }
    return;
  }

  if (session.stage === 'await_fault_category') {
    session.faultCategory = text.trim();
    session.stage = 'await_fault_description';
    botSay('Briefly describe the issue:');
    return;
  }

  if (session.stage === 'await_fault_description') {
    const res = await fetch(`${API_BASE}/tickets`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...NGROK_HEADERS },
      body: JSON.stringify({
        municipality_id: MUNICIPALITY_ID,
        account_id: session.account.id,
        category: session.faultCategory,
        description: text.trim(),
      }),
    });
    const ticket = await res.json();
    session.stage = 'menu';
    botSay(`Logged. Your reference number is ${ticket.reference_number}. We'll keep you posted.`);
    setQuickReplies(['balance', 'pay', 'report fault']);
    return;
  }
}

function openPayGateInNewTab(processUrl, payRequestId, checksum) {
  const win = window.open('', '_blank');
  const form = win.document.createElement('form');
  form.method = 'POST';
  form.action = processUrl;
  for (const [name, value] of Object.entries({ PAY_REQUEST_ID: payRequestId, CHECKSUM: checksum })) {
    const input = win.document.createElement('input');
    input.type = 'hidden';
    input.name = name;
    input.value = value;
    form.appendChild(input);
  }
  win.document.body.appendChild(form);
  form.submit();
}

function handleFreeText() {
  const input = document.getElementById('free-text');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  handleInput(text);
}

document.getElementById('free-text').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleFreeText();
});

botSay("Welcome to Swartland Municipality's WhatsApp line.\nPlease reply with your account number to get started (e.g. SW-00123).");
</script>
</body>
</html>
